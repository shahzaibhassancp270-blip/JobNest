name: jobnest
description: A Job Search & Application Tracker app.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.4.9
  go_router: ^13.1.0
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.2
  google_sign_in: ^6.1.6
  dio: ^5.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.66.0
  flutter_local_notifications: ^18.0.0
  shimmer: ^3.0.0
  url_launcher: ^6.2.2
  intl: ^0.19.0
  timezone: ^0.9.2
  shared_preferences: ^2.2.2
  font_awesome_flutter: ^10.6.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
